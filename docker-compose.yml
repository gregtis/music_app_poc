services:
  music-app:
    build: .
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/fb0:/dev/fb0
      - /dev/tty1:/dev/tty1
      - /dev/snd:/dev/snd
    volumes:
      - /dev/input:/dev/input
    environment:
      - SDL_VIDEODRIVER=offscreen
      - SDL_AUDIODRIVER=alsa
      - PYTHONUNBUFFERED=1
